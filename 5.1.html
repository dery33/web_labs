        <h1>CSS</h1>
        <p>CSS простіший, ніж HTML. CSS складається з багатьох правил на зразок наступних:</p>
        <p class="white">селектор{<br />
            <span class="pre">властивість1: <span class="blue_text">значення;</span></span><br />
            <span class="pre">властивість2: <span class="blue_text">значення;</span></span><br />
        }
        </p>
        <p>Правила досить прості. Але властивостей <span class="blue_text">дуже</span> багато.</p>
        <p>Будемо вивчати і практикуватися в CSS.</p>
        <p>Успіхів у роботі.</p>
